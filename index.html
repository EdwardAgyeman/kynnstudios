    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root {
      --bg: #efead6;
      --bg-deep: #e8e3cf;
      --fg: #1a1208;
      --fg-muted: #3d3528;
      --fg-dim: rgba(26,18,8,0.55);
      --accent: #E8E4C8;
      --logo: 'Segoe Script', cursive;
      --body: 'Jost', sans-serif;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }



    /* ── layout ── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 2.5rem 3rem;
    }

    /* ── top bar ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fadeIn 1.2s ease 0.3s forwards;
    }

    .topbar-label {
      font-family: var(--body);
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--fg-muted);
    }

    .topbar-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .topbar-status span {
      font-family: var(--body);
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fg-dim);
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--fg);
      animation: breathe 4s ease-in-out infinite;
    }

    /* ── hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.2rem;
      text-align: center;
    }

    .wordmark {
      font-family: var(--logo);
      font-weight: 400;
      font-size: clamp(4rem, 11vw, 9rem);
      line-height: 1;
      letter-spacing: 0.02em;
      color: var(--fg);
      opacity: 0;
      transform: translateY(24px) scale(0.97);
      animation: wordmarkIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }

    .wordmark .dot {
      color: var(--fg);
      opacity: 0;
      display: inline-block;
      animation: dotIn 0.5s ease 1.3s forwards;
    }

    .subtitle {
      font-family: var(--body);
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--fg-muted);
      opacity: 0;
      animation: fadeIn 1s ease 1s forwards;
    }

    .separator {
      display: flex;
      align-items: center;
      opacity: 0;
      animation: fadeIn 1s ease 1.15s forwards;
    }

    .sep-line {
      width: 60px;
      height: 1px;
      background: rgba(232,228,200,0.25);
    }

    .tagline {
      font-family: var(--body);
      font-size: clamp(0.95rem, 1.8vw, 1.15rem);
      font-weight: 300;
      font-style: normal;
      color: var(--fg);
      opacity: 0;
      letter-spacing: 0.08em;
      animation: fadeIn 1s ease 1.3s forwards;
    }

    /* ── notify form ── */
    .notify-form {
      display: flex;
      align-items: stretch;
      margin-top: 0.5rem;
      opacity: 0;
      animation: fadeIn 1s ease 1.5s forwards;
      border: 1px solid var(--fg-dim);
      overflow: hidden;
      transition: border-color 0.3s ease;
    }

    .notify-form:focus-within {
      border-color: var(--fg-muted);
    }

    .notify-input {
      background: transparent;
      border: none;
      padding: 0.8rem 1.3rem;
      font-family: var(--body);
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--fg);
      outline: none;
      width: 250px;
    }

    .notify-input::placeholder {
      color: var(--fg-dim);
    }

    .notify-btn {
      background: transparent;
      border: none;
      border-left: 1px solid var(--fg-dim);
      padding: 0.8rem 1.5rem;
      font-family: var(--body);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--fg);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .notify-btn:hover {
      background: var(--fg);
      color: var(--bg);
    }

    /* ── bottom bar ── */
    .bottombar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeIn 1s ease 1.8s forwards;
    }

    .social-links {
      display: flex;
      gap: 2rem;
    }

    .social-links a {
      font-family: var(--body);
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--fg-dim);
      text-decoration: none;
      transition: color 0.3s ease;
      position: relative;
    }

    .social-links a::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--fg);
      transition: width 0.3s ease;
    }

    .social-links a:hover {
      color: var(--fg);
    }

    .social-links a:hover::after {
      width: 100%;
    }

    .copyright {
      font-family: var(--body);
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--fg-dim);
    }

    /* ── animations ── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes wordmarkIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes dotIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.25; transform: scale(0.85); }
    }

    /* ── responsive ── */
    @media (max-width: 600px) {
      .page { padding: 1.8rem 1.5rem; }
      .notify-input { width: 190px; }
      .social-links { gap: 1.4rem; }
      .bottombar {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- top -->
    <div class="topbar">
      <span class="topbar-label">Kynn Studios</span>
      <div class="topbar-status">
        <span>Coming Soon</span>
        <div class="status-dot"></div>
      </div>
    </div>

    <!-- hero -->
    <main class="hero">
      <h1 class="wordmark">KYNN<span class="dot">.</span></h1>

      <p class="subtitle">Creative Direction &ensp;&middot;&ensp; Consulting &ensp;&middot;&ensp; Photography</p>

      <div class="separator">
        <div class="sep-line"></div>
      </div>

      <p class="tagline">Rooted in storytelling</p>

      <div class="notify-form">
        <input type="email" class="notify-input" placeholder="Your email" aria-label="Email address" />
        <button class="notify-btn" onclick="handleNotify()">Notify Me</button>
      </div>
    </main>

    <!-- bottom -->
    <div class="bottombar">
      <div class="social-links">
        <a href="https://www.instagram.com/kynnstudios_/" target="_blank" rel="noopener" aria-label="Instagram" style="display:flex;align-items:center;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="transition:opacity 0.3s ease;">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="4.5"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </a>
        <a href="mailto:edward@kynnstudios.com,krystal@kynnstudios.com" aria-label="Email" style="display:flex;align-items:center;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="transition:opacity 0.3s ease;">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
        </a>
      </div>
      <span class="copyright">&copy; 2026 kynn. studios</span>
    </div>

  </div>

  <script>
    async function handleNotify() {
      const input = document.querySelector('.notify-input');
      const btn = document.querySelector('.notify-btn');
      const email = input.value.trim();

      if (!email || !email.includes('@')) {
        document.querySelector('.notify-form').style.borderColor = '#8B3A3A';
        setTimeout(() => document.querySelector('.notify-form').style.borderColor = '', 1500);
        return;
      }

      btn.textContent = 'SENDING...';
      btn.disabled = true;
      input.disabled = true;

      try {
        const res = await fetch('https://formspree.io/f/xjgjyqnl', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ email })
        });

        if (res.ok) {
          btn.textContent = 'NOTED';
          btn.style.background = 'var(--fg)';
          btn.style.color = 'var(--bg)';
          input.value = '';
          setTimeout(() => {
            btn.textContent = 'NOTIFY ME';
            btn.style.background = '';
            btn.style.color = '';
            input.disabled = false;
            btn.disabled = false;
          }, 3000);
        } else {
          throw new Error('Failed');
        }
      } catch {
        btn.textContent = 'TRY AGAIN';
        btn.disabled = false;
        input.disabled = false;
        setTimeout(() => btn.textContent = 'NOTIFY ME', 2000);
      }
    }

    document.querySelector('.notify-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleNotify();
    });
  </script>
</body>
</html>
